<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Bark & Stroll — Admin</title>
<link rel="icon" type="image/png" href="https://barkstroll.com/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/admin/static/css/style.css">
</head>
<body class="admin-app">

<div class="app-layout">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <img class="sidebar-logo" src="/admin/static/bridgeville-bark-stroll-logo.png" alt="Bark & Stroll" />
      <span class="sidebar-name">Bark & Stroll</span>
    </div>
    <nav class="sidebar-nav">
      <button class="sidebar-link" data-view="dashboard">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>Dashboard</span>
      </button>
      <button class="sidebar-link" data-view="customers">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span>Clients</span>
      </button>
      <button class="sidebar-link" data-view="calendar">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>
        <span>Calendar</span>
      </button>
      <button class="sidebar-link" data-view="employees">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <span>Team</span>
      </button>
      <button class="sidebar-link" data-view="messages">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        <span>Messages</span>
      </button>
      <button class="sidebar-link" data-view="reports">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        <span>Reports</span>
      </button>
      <button class="sidebar-link" data-view="gallery">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        <span>Gallery</span>
      </button>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-avatar" id="userAvatar">S</div>
        <div>
          <div class="sidebar-user-name" id="sidebarUserName">Scott</div>
          <div class="sidebar-user-role">Administrator</div>
        </div>
      </div>
      <button class="sidebar-logout" id="logoutBtn">Sign Out</button>
    </div>
  </aside>

  <!-- Sidebar backdrop (mobile) -->
  <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

  <!-- Main area -->
  <div class="main">
    <header class="main-header">
      <button class="menu-toggle" id="menuToggle">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="18" y2="18"/></svg>
      </button>
      <h1 class="main-header-title" id="pageTitle">Dashboard</h1>
    </header>
    <div class="content" id="content">
      <div class="empty"><div class="empty-icon">🐾</div><div class="empty-text">Loading...</div></div>
    </div>
  </div>
</div>

<!-- Bottom nav (mobile only) -->
<nav class="bottomnav">
  <button class="nav-tab" data-view="dashboard"><span class="nav-icon">🏠</span>Home</button>
  <button class="nav-tab" data-view="customers"><span class="nav-icon">👥</span>Clients</button>
  <button class="nav-tab" data-view="calendar"><span class="nav-icon">📅</span>Calendar</button>
  <button class="nav-tab" data-view="employees"><span class="nav-icon">🐕</span>Team</button>
</nav>

<div class="modal-overlay" id="modal"></div>
<div class="toast-container" id="toasts"></div>

<script src="/admin/static/js/app.js"></script>
<script src="/admin/static/js/views/dashboard.js"></script>
<script src="/admin/static/js/views/customers.js"></script>
<script src="/admin/static/js/views/calendar.js"></script>
<script src="/admin/static/js/views/employees.js"></script>
<script src="/admin/static/js/views/docgen.js"></script>
<script src="/admin/static/js/views/messages.js"></script>
<script src="/admin/static/js/views/reports.js"></script>
<script src="/admin/static/js/views/gallery.js"></script>
</body>
</html>
