<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Bark & Stroll — My Portal</title>
<link rel="icon" type="image/png" href="https://barkstroll.com/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/admin/static/css/style.css">
<style>
.busy-block{background:#f0efec;border-left:4px solid #ccc;padding:.5rem .75rem;border-radius:var(--radius-sm);margin-bottom:.4rem;font-size:.8rem;color:var(--text-soft)}
.request-badge{background:#fff3e0;color:#e65100;font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;padding:.15rem .5rem;border-radius:4px;display:inline-block;margin-top:.25rem}
.report-btn{position:fixed;bottom:68px;right:.75rem;background:var(--white);border:1.5px solid #ddd;color:var(--text-soft);font-size:.7rem;font-weight:500;padding:.35rem .7rem;border-radius:var(--radius-sm);cursor:pointer;z-index:90;font-family:inherit;transition:all .15s}
.report-btn:hover{border-color:var(--danger);color:var(--danger)}
</style>
</head>
<body>

<div class="topbar">
  <span class="topbar-title">Bark & Stroll</span>
  <button class="topbar-btn" id="logoutBtn">Sign Out</button>
</div>

<div class="content" id="content">
  <div class="empty"><div class="empty-icon">🐾</div><div class="empty-text">Loading...</div></div>
</div>

<nav class="bottomnav">
  <button class="nav-tab active" data-view="calendar"><span class="nav-icon">📅</span>Calendar</button>
  <button class="nav-tab" data-view="walks"><span class="nav-icon">🐕</span>My Walks</button>
</nav>

<button class="report-btn" id="reportBtn">Report Issue</button>

<div class="modal-overlay" id="modal"></div>
<div class="toast-container" id="toasts"></div>

<script src="/admin/static/js/client-app.js"></script>
</body>
</html>
