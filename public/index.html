<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bark & Stroll: Staff Login</title>
<link rel="icon" type="image/png" href="https://barkstroll.com/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--forest:#14613a;--forest-deep:#0d4428;--sage:#e8f0e6;--cream:#faf8f4;--gold:#c4a44e;--white:#fff;--text:#2a2a28;--text-soft:#5a5a56;--radius:20px;--radius-sm:12px}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem}
.card{background:var(--white);border-radius:var(--radius);box-shadow:0 4px 24px rgba(0,0,0,.08);padding:2.5rem 2rem;width:100%;max-width:380px;text-align:center}
.logo{width:90px;height:90px;border-radius:50%;object-fit:cover;margin:0 auto 1rem;display:block;box-shadow:0 2px 12px rgba(0,0,0,.1)}
h1{font-family:'DM Serif Display',serif;font-size:1.5rem;margin-bottom:.25rem}
.sub{color:var(--text-soft);font-size:.85rem;margin-bottom:1.75rem}
.field{margin-bottom:1rem;text-align:left}
.field label{display:block;font-size:.75rem;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--text-soft);margin-bottom:.35rem}
.field input{width:100%;padding:.7rem .9rem;border:1.5px solid #ddd;border-radius:var(--radius-sm);font-family:inherit;font-size:.95rem;color:var(--text);outline:none;transition:border-color .2s}
.field input:focus{border-color:var(--forest)}
.btn{width:100%;padding:.75rem;background:var(--forest);color:var(--white);border:none;border-radius:var(--radius-sm);font-family:inherit;font-size:.95rem;font-weight:600;cursor:pointer;transition:background .2s;margin-top:.5rem}
.btn:hover{background:var(--forest-deep)}
.btn:active{transform:scale(.98)}
.err{color:#c0392b;font-size:.8rem;margin-top:.75rem;min-height:1.2em}
.back{display:inline-block;margin-top:1.25rem;font-size:.8rem;color:var(--text-soft);text-decoration:none}
.back:hover{color:var(--forest)}
</style>
</head>
<body>
<div class="card">
  <img class="logo" src="https://barkstroll.com/bridgeville-bark-stroll-logo.png" alt="Bark & Stroll">
  <h1>Portal</h1>
  <p class="sub">Sign in to your account</p>
  <form id="loginForm">
    <div class="field">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" autocomplete="username" required>
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn">Sign In</button>
    <p class="err" id="err"></p>
  </form>
  <a href="/" class="back">&larr; Back to barkstroll.com</a>
</div>
<script>
(function() {
  const form = document.getElementById('loginForm');
  const errEl = document.getElementById('err');
  let pendingTotp = null; // { mode: 'totp_setup'|'totp_required', username, password, qr_url?, secret_manual? }

  form.addEventListener('submit', async function(e) {
    e.preventDefault();
    errEl.textContent = '';

    // --- TOTP code submission ---
    if (pendingTotp) {
      const token = document.getElementById('totpCode').value.trim();
      if (!token) { errEl.textContent = 'Please enter the authenticator code'; return; }
      try {
        const r = await fetch('/admin/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: pendingTotp.username,
            password: pendingTotp.password,
            totp_token: token
          })
        });
        const data = await r.json();
        if (r.ok && data.ok) {
          const role = data.user && data.user.role;
          if (role === 'customer') { window.location.href = '/client'; }
          else if (role === 'walker') { window.location.href = '/walker'; }
          else { window.location.href = '/admin/app'; }
          return;
        }
        errEl.textContent = data.error || 'Invalid code';
        document.getElementById('totpCode').value = '';
      } catch {
        errEl.textContent = 'Connection error';
      }
      return;
    }

    // --- Normal login ---
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    if (!username || !password) { errEl.textContent = 'Please fill in both fields'; return; }

    try {
      const r = await fetch('/admin/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await r.json();

      // TOTP setup — show QR code + code input
      if (data.totp_setup) {
        pendingTotp = { mode: 'totp_setup', username, password, qr_url: data.qr_url, secret_manual: data.secret_manual };
        showTotpUI(true, data.qr_url, data.secret_manual);
        return;
      }

      // TOTP required — show just code input
      if (data.totp_required) {
        pendingTotp = { mode: 'totp_required', username, password };
        showTotpUI(false);
        return;
      }

      // Locked
      if (r.status === 423 || data.locked) {
        errEl.textContent = data.error || 'Account locked. Try again later.';
        return;
      }

      // Success
      if (r.ok && data.ok) {
        const role = data.user && data.user.role;
        if (role === 'customer') { window.location.href = '/client'; }
        else if (role === 'walker') { window.location.href = '/walker'; }
        else { window.location.href = '/admin/app'; }
        return;
      }

      errEl.textContent = data.error || 'Invalid credentials';
    } catch {
      errEl.textContent = 'Connection error';
    }
  });

  function showTotpUI(isSetup, qrUrl, secretManual) {
    // Hide username/password fields
    var fieldContainer = form.querySelector('.field:nth-child(1)');
    var fieldContainer2 = form.querySelector('.field:nth-child(2)');
    fieldContainer.style.display = 'none';
    fieldContainer2.style.display = 'none';

    // Build TOTP UI
    var btn = form.querySelector('.btn');
    var html = '<div class="field" id="totpField">';
    if (isSetup) {
      html += '<p style="font-size:.85rem;color:var(--text-soft);margin-bottom:1rem;line-height:1.4">' +
        'Scan with Google Authenticator or Authy</p>' +
        '<div style="text-align:center;margin-bottom:1rem;"><img src="' + qrUrl + '" alt="QR Code" style="width:180px;height:180px;border-radius:8px;"></div>' +
        '<p style="font-size:.75rem;color:var(--text-soft);margin-bottom:1rem;text-align:center;word-break:break-all;">Manual key: <strong>' + secretManual + '</strong></p>';
    } else {
      html += '<p style="font-size:.85rem;color:var(--text-soft);margin-bottom:1rem;line-height:1.4">' +
        'Enter the code from your authenticator app</p>';
    }
    html += '<label for="totpCode">Authenticator Code</label>' +
      '<input type="text" id="totpCode" name="totp" autocomplete="one-time-code" inputmode="numeric" maxlength="6" required placeholder="000000">' +
      '</div>';
    btn.insertAdjacentHTML('beforebegin', html);
    btn.textContent = 'Verify';
    document.getElementById('totpCode').focus();
  }
})();
</script>
</body>
</html>
